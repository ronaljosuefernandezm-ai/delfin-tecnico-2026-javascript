<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulacro PRO - Corregido</title>
    <style>
        :root {
            --primary: #1a2a6c;
            --accent: #f24e1e;
            --bg: #f0f2f5;
            --success: #2ecc71;
            --danger: #e74c3c;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }

        .status-bar {
            background: var(--primary); color: white; width: 90%; max-width: 800px;
            padding: 15px; border-radius: 10px; display: flex; justify-content: space-around;
            position: sticky; top: 10px; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .timer-warning { color: #ffeb3b; font-weight: bold; animation: blink 1s infinite; }

        .wheel-box { position: relative; width: 280px; height: 280px; margin: 20px 0; }
        #canvas { 
            width: 100%; height: 100%; border-radius: 50%; 
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); 
            border: 8px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
        }
        .arrow { 
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%); 
            width: 40px; height: 40px; background: var(--accent); 
            clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; 
        }
        #spin-btn { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 70px; height: 70px; border-radius: 50%; border: none; 
            background: #333; color: white; cursor: pointer; font-weight: bold; 
            z-index: 11; box-shadow: 0 4px 0 #000;
        }
        #spin-btn:disabled { background: #999; cursor: not-allowed; box-shadow: none; }

        #quiz-container { 
            background: white; width: 90%; max-width: 700px; padding: 25px; 
            border-radius: 15px; display: none; margin-top: 20px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 50px; 
        }
        .subject-label { font-weight: bold; text-transform: uppercase; padding: 5px 12px; border-radius: 5px; color: white; display: inline-block; margin-bottom: 15px; }
        .option { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            border: 2px solid #eee; border-radius: 10px; text-align: left; 
            cursor: pointer; background: white; transition: 0.2s; 
        }
        .option:hover { background: #f0f7ff; border-color: var(--primary); }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="status-bar">
        <div>⏳ <span id="timer">04:00:00</span></div>
        <div>📝 <span id="counter">0</span>/278</div>
        <div>🏆 <span id="score">0</span> pts</div>
    </div>

    <div class="wheel-box">
        <div class="arrow"></div>
        <canvas id="canvas" width="400" height="400"></canvas>
        <button id="spin-btn" onclick="spin()">GIRAR</button>
    </div>

    <div id="quiz-container">
        <div id="materia-tag" class="subject-label"></div>
        <p id="pregunta-texto" style="font-size: 1.2rem; font-weight: 500;"></p>
        <div id="opciones-box"></div>
    </div>

<script>
    const bancoPreguntas = [
        { cat: "Matemáticas", q: "Un tanque se llena en 4 horas con un grifo A. ¿En cuánto se llena con dos grifos iguales funcionando a la vez?", o: ["2 horas", "4 horas", "8 horas", "1 hora"], c: "2 horas" },
        { cat: "Matemáticas", q: "Si el 20% de x es 40, ¿cuál es el valor de x?", o: ["200", "150", "80", "400"], c: "200" },
        { cat: "Lectura Crítica", q: "La intención principal de un editorial periodístico es:", o: ["Persuadir/Opinar", "Informar objetivamente", "Entretener al lector", "Publicar avisos"], c: "Persuadir/Opinar" },
        { cat: "Ciencias Naturales", q: "¿Qué organelo es responsable de la respiración celular?", o: ["Mitocondria", "Ribosoma", "Núcleo", "Lisosoma"], c: "Mitocondria" },
        { cat: "Sociales", q: "La Revolución Industrial nació en:", o: ["Inglaterra", "Francia", "EE.UU", "Alemania"], c: "Inglaterra" },
        { cat: "Inglés", q: "I have __ my homework already.", o: ["done", "do", "did", "doing"], c: "done" }
        // ... (puedes agregar las 278 aquí)
    ];

    let respondidasIndices = new Set();
    let score = 0;
    let totalSeconds = 4 * 60 * 60;
    let currentRotation = 0; // Para acumular rotación y que no salte

    const subjects = [
        { name: "Matemáticas", color: "#e74c3c" },
        { name: "Lectura Crítica", color: "#3498db" },
        { name: "Ciencias Naturales", color: "#2ecc71" },
        { name: "Sociales", color: "#f1c40f" },
        { name: "Inglés", color: "#9b59b6" }
    ];

    // Cronómetro
    const interval = setInterval(() => {
        totalSeconds--;
        let h = Math.floor(totalSeconds / 3600);
        let m = Math.floor((totalSeconds % 3600) / 60);
        let s = totalSeconds % 60;
        document.getElementById('timer').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        if(totalSeconds <= 0) clearInterval(interval);
    }, 1000);

    // Dibujar Ruleta
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    function draw() {
        const angle = (2 * Math.PI) / subjects.length;
        subjects.forEach((s, i) => {
            ctx.beginPath();
            ctx.fillStyle = s.color;
            ctx.moveTo(200, 200);
            ctx.arc(200, 200, 200, i * angle, (i + 1) * angle);
            ctx.fill();
            ctx.save();
            ctx.translate(200, 200);
            ctx.rotate(i * angle + angle/2);
            ctx.fillStyle = "white";
            ctx.font = "bold 16px Arial";
            ctx.textAlign = "right";
            ctx.fillText(s.name, 180, 8);
            ctx.restore();
        });
    }
    draw();

    function spin() {
        if(respondidasIndices.size >= bancoPreguntas.length) return alert("¡Simulacro completado!");
        
        const btn = document.getElementById('spin-btn');
        btn.disabled = true;

        // Girar al menos 5 vueltas + aleatorio
        const extraDeg = Math.floor(Math.random() * 360) + 1800; 
        currentRotation += extraDeg;
        canvas.style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
            // CÁLCULO CORREGIDO:
            // 1. Normalizar grados (0-360)
            const normalizedDeg = currentRotation % 360;
            // 2. La flecha está a 270° (arriba) respecto al inicio del dibujo (0° derecha)
            // Calculamos qué sección quedó bajo la flecha
            const segmentSize = 360 / subjects.length;
            const index = Math.floor(((360 - normalizedDeg + 270) % 360) / segmentSize);
            
            generarPregunta(subjects[index].name);
        }, 4000);

        document.getElementById('spin-btn').disabled = false;
    }

    function generarPregunta(materia) {
        const disponibles = bancoPreguntas.map((p, i) => i)
            .filter(i => bancoPreguntas[i].cat === materia && !respondidasIndices.has(i));

        if(disponibles.length === 0) {
            alert(`No hay más preguntas de ${materia}. ¡Gira de nuevo!`);
            document.getElementById('spin-btn').disabled = false;
            return;
        }

        const randomIdx = disponibles[Math.floor(Math.random() * disponibles.length)];
        const p = bancoPreguntas[randomIdx];

        const container = document.getElementById('quiz-container');
        container.style.display = 'block';
        
        const tag = document.getElementById('materia-tag');
        tag.innerText = p.cat;
        tag.style.backgroundColor = subjects.find(s => s.name === p.cat).color;
        
        document.getElementById('pregunta-texto').innerText = p.q;
        const box = document.getElementById('opciones-box');
        box.innerHTML = '';

        [...p.o].sort(() => Math.random() - 0.5).forEach(opt => {
            const b = document.createElement('button');
            b.className = 'option';
            b.innerText = opt;
            b.onclick = () => {
                respondidasIndices.add(randomIdx);
                if(opt === p.c) {
                    score += 1.8;
                    alert("✅ Correcto");
                } else {
                    alert("❌ Incorrecto. Era: " + p.c);
                }
                actualizarUI();
            };
            box.appendChild(b);
        });
        container.scrollIntoView({ behavior: 'smooth' });
    }

    function actualizarUI() {
        document.getElementById('score').innerText = Math.round(score);
        document.getElementById('counter').innerText = respondidasIndices.size;
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('spin-btn').disabled = false;
    }
</script>
</body>
</html>
